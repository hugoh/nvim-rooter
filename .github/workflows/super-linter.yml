name: Super-Linter

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read # to read your repository's code for linting
  statuses: write # to update the status checks for the linter results

jobs:
  super-linter:
    name: Lint Code Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Super-Linter
        uses: super-linter/super-linter/slim@cc90344711f7c84363cb32fff58a42f42dd05cbb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_BIOME_FORMAT: false
          LINTER_RULES_PATH: .
