name: tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          persist-credentials: false
      - name: Install Neovim
        uses: rhysd/action-setup-vim@74c12daa1c51341c18a1132132daa63ea447bf3d
        with:
          neovim: true
          version: v0.12.0 # renovate: datasource=github-releases depName=neovim/neovim
      - name: Setup Plenary
        run: |
          mkdir -p ~/.local/share/nvim/lazy
          git clone --depth 1 https://github.com/nvim-lua/plenary.nvim ~/.local/share/nvim/lazy/plenary.nvim
      - name: Run tests
        run: make test
